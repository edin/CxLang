name: Verify

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Make GCC available
        shell: pwsh
        run: |
          if (Get-Command gcc -ErrorAction SilentlyContinue) {
            gcc --version
            exit 0
          }

          $gccDirectories = @(
            'C:\msys64\ucrt64\bin',
            'C:\msys64\mingw64\bin'
          )

          $gccDirectory = $gccDirectories |
            Where-Object { Test-Path (Join-Path $_ 'gcc.exe') } |
            Select-Object -First 1

          if (-not $gccDirectory) {
            throw 'GCC was not found on the Windows runner.'
          }

          $gccDirectory | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & (Join-Path $gccDirectory 'gcc.exe') --version

      - name: Run repository verification
        shell: pwsh
        run: ./scripts/verify.ps1
